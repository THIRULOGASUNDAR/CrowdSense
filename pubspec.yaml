name: crowdsense
description: "CrowdSense - Smart crowd prediction and travel planning application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.4
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.2
  firebase_messaging: ^15.2.1
  provider: ^6.1.2
  http: ^1.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  go_router: ^13.2.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fluttertoast: ^8.2.10
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.0
  geolocator: ^11.1.0
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
