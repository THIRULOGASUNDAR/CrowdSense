[pytest]
# CrowdSense Selenium E2E Test Suite — pytest configuration
testpaths = selenium_tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity
log_cli = true
log_cli_level = INFO

# Markers
markers =
    smoke: Quick critical path sanity checks
    auth: Authentication and route guard tests
    home: Home screen and navigation tests
    search: Search and discovery tests
    place: Place details tests
    crowd: Crowd intelligence tests
    profile: Profile and account tests
    favorites: Favorites tests
    planner: Travel planner tests
    settings: Settings tests
    ui: UI/UX and responsiveness tests
    performance: Performance tests
    edge: Edge case tests
    accessibility: Accessibility tests
