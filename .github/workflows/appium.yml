name: App E2E Automation Testing

# ─────────────────────────────────────────────────────────────
#  Trigger: runs on every push to any branch,
#           and on pull requests targeting main / master.
#  Goal   : Execute Mobile (Appium) E2E tests on Android emulator
#           using a self-hosted Windows runner, generate reports,
#           and upload artifacts.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  app-e2e:
    name: Run App E2E Tests & Generate Reports
    # Requirement 1: Change the Appium job to use: runs-on: self-hosted
    runs-on: self-hosted

    steps:
      # ── 1. Checkout Repository ─────────────────────────────
      # Checks out the repository code under the GitHub workspace.
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Java setup (required for Android build toolchain) ──────────────────────
      # Sets up Java JDK 17, which is required for building the Flutter Android app.
      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── 3. Configure Android SDK Environment Variables ────────────────────────────
      # Detects ANDROID_HOME. If not defined on the runner environment, checks common 
      # Windows default installation paths, then registers it in GITHUB_ENV and adds 
      # required SDK subdirectories to GITHUB_PATH so CLI tools (like adb/emulator) are visible.
      - name: 🤖 Setup Android SDK Environment Variables
        shell: powershell
        run: |
          if (-not $env:ANDROID_HOME) {
            $commonPaths = @(
              "$env:LOCALAPPDATA\Android\Sdk",
              "C:\Android\sdk",
              "C:\Program Files (x86)\Android\android-sdk"
            )
            foreach ($path in $commonPaths) {
              if (Test-Path $path) {
                $env:ANDROID_HOME = $path
                break
              }
            }
          }
          if (-not $env:ANDROID_HOME) {
             Write-Error "ANDROID_HOME is not set and could not be automatically detected. Please configure ANDROID_HOME on your self-hosted runner."
             exit 1
          }
          Write-Host "Using ANDROID_HOME: $env:ANDROID_HOME"
          echo "ANDROID_HOME=$env:ANDROID_HOME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          # Add tools, platform-tools, and emulator directories to GITHUB_PATH
          $sdkPaths = @(
            "$env:ANDROID_HOME\platform-tools",
            "$env:ANDROID_HOME\emulator",
            "$env:ANDROID_HOME\tools",
            "$env:ANDROID_HOME\tools\bin"
          )
          foreach ($p in $sdkPaths) {
            if (Test-Path $p) {
              Write-Host "Adding to PATH: $p"
              echo "$p" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      # ── 4. Flutter SDK setup ───────────────────────────────
      # Checks if Flutter is already in PATH. If not, checks environment variables
      # or common Windows folders to register Flutter SDK natively on Windows.
      - name: 🚀 Setup Flutter SDK
        shell: powershell
        run: |
          $flutterCmd = Get-Command flutter -ErrorAction SilentlyContinue
          if ($flutterCmd) {
              Write-Host "Flutter is already available in PATH: $($flutterCmd.Source)"
              exit 0
          }
          
          # Check standard environment variables
          $envPaths = @($env:FLUTTER_HOME, $env:FLUTTER_ROOT, $env:FLUTTER_PATH)
          foreach ($ep in $envPaths) {
              if ($ep) {
                  $binPath = Join-Path $ep "bin"
                  if (Test-Path "$binPath\flutter.bat") {
                      Write-Host "Found Flutter in environment variable path: $binPath"
                      echo "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                      exit 0
                  }
              }
          }
          
          # Check typical local install paths
          $commonPaths = @(
              "C:\flutter\bin",
              "C:\src\flutter\bin",
              "D:\flutter\bin",
              "E:\flutter\bin"
          )
          foreach ($cp in $commonPaths) {
              if (Test-Path "$cp\flutter.bat") {
                  Write-Host "Found Flutter at: $cp"
                  echo "$cp" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                  exit 0
              }
          }
          
          Write-Error "Flutter SDK not found! Please pre-install Flutter on your self-hosted Windows runner."
          exit 1

      # ── 5. Python setup ────────────────────────────────────
      # Prepares Python environment and configures pip dependency caching.
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: appium_tests/requirements.txt

      # ── 6. Install Python Dependencies ──────────────────────
      # Upgrades pip and installs packages required by the Appium Python test suite.
      # Switched to shell: powershell to avoid dependency on Git Bash.
      - name: 📦 Install Python Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r appium_tests/requirements.txt

      # ── 7. Node.js setup ───────────────────────────────────
      # Installs Node.js which is required to execute Appium.
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── 8. Appium Availability Checks ──────────────────────
      # Verifies if Appium and the UiAutomator2 driver are installed.
      # If they are missing on the runner, installs them globally.
      - name: 📱 Check and Install Appium & Driver
        shell: powershell
        run: |
          $appiumInstalled = Get-Command appium -ErrorAction SilentlyContinue
          if (-not $appiumInstalled) {
              Write-Host "Appium not found. Installing globally..."
              npm install -g appium
          } else {
              Write-Host "Appium is already installed globally."
          }
          
          $drivers = appium driver list --installed
          if ($drivers -match "uiautomator2") {
              Write-Host "UiAutomator2 driver is already installed."
          } else {
              Write-Host "UiAutomator2 driver not found. Installing..."
              appium driver install uiautomator2
          }

      # ── 9. Build Flutter Debug APK ──────────────────────────
      # Requirement 4: Ensure the workflow builds the Flutter Android application
      # before running the Appium tests.
      - name: 🛠️ Build Debug APK
        shell: powershell
        run: |
          cd frontend
          flutter pub get
          flutter build apk --debug

      # ── 10. Start Android Emulator & Verify ADB Devices ─────
      # Checks if an emulator is already online. If not, lists AVDs, 
      # boots the preferred or first AVD in background, and polls until 
      # the emulator has completed bootup (sys.boot_completed = 1).
      - name: 🤖 Start Android Emulator & Verify ADB
        shell: powershell
        run: |
          # 1. Verify adb devices
          Write-Host "Verifying connected adb devices..."
          $devices = adb devices
          $emulatorRunning = $false
          foreach ($line in $devices) {
              if ($line -match "emulator-\d+\s+device") {
                  $emulatorRunning = $true
                  Write-Host "An Android emulator is already running: $line"
                  break
              }
          }
          
          # 2. Start emulator if not already running
          if (-not $emulatorRunning) {
              Write-Host "No emulator running. Checking available AVDs..."
              $avds = emulator -list-avds
              if ($avds.Count -eq 0 -or -not $avds) {
                  Write-Error "No Android Virtual Devices (AVDs) found on this runner! Please create one."
                  exit 1
              }
              
              # Prefer Pixel_3a (matching original config), fallback to first available
              $avdName = $avds[0]
              foreach ($avd in $avds) {
                  if ($avd -eq "Pixel_3a") {
                      $avdName = "Pixel_3a"
                      break
                  }
              }
              
              Write-Host "Starting emulator with AVD: $avdName in the background..."
              Start-Process -FilePath "emulator" -ArgumentList "-avd $avdName -no-window -no-snapshot -no-audio -no-boot-anim" -WindowStyle Hidden
              
              # Wait for boot completion
              Write-Host "Waiting for the emulator to finish booting..."
              $timeout = 120
              $elapsed = 0
              $booted = $false
              while ($elapsed -lt $timeout) {
                  $devs = adb devices
                  foreach ($line in $devs) {
                      if ($line -match "emulator-\d+\s+device") {
                          $bootStatus = adb shell getprop sys.boot_completed
                          if ($bootStatus -match "1") {
                              $booted = $true
                              break
                          }
                      }
                  }
                  if ($booted) { break }
                  Start-Sleep -Seconds 5
                  $elapsed += 5
                  Write-Host "Waiting for boot... ($elapsed seconds elapsed)"
              }
              if (-not $booted) {
                  Write-Error "Emulator boot timed out after $timeout seconds."
                  exit 1
              }
              Write-Host "Android emulator is fully booted and ready."
          }
          
          # 3. Final adb devices confirmation
          Write-Host "Connected devices list:"
          adb devices

      # ── 11. Create Reports Directory ───────────────────────
      # Creates target folder for report files. Switched to powershell.
      - name: 📁 Create Reports Directory
        shell: powershell
        run: |
          if (-not (Test-Path "appium_tests/reports")) {
              New-Item -ItemType Directory -Path "appium_tests/reports" -Force
          }

      # ── 12. Capture Metadata ───────────────────────────────
      # Saves current execution timestamp, git SHA, and branch name into GITHUB_ENV.
      # Rewritten in powershell to support runner environment natively.
      - name: 🏷️ Capture Run Metadata
        shell: powershell
        run: |
          $runTs = Get-Date -Format "yyyy-MM-dd_HH-mm-ss"
          $gitSha = $env:GITHUB_SHA.Substring(0, [Math]::Min(7, $env:GITHUB_SHA.Length))
          $gitBranch = $env:GITHUB_REF_NAME
          echo "RUN_TS=$runTs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "GIT_SHA=$gitSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "GIT_BRANCH=$gitBranch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 13. Execute Appium tests in Android emulator ───────────
      # Requirement 2: Keep the existing Appium test execution logic unchanged.
      # Starts Appium in background and runs pytest in PowerShell.
      - name: 🧪 Execute Appium Mobile E2E Tests
        shell: powershell
        run: |
          # Start Appium server in background
          Start-Process -FilePath "appium" -ArgumentList "--log appium_server.log" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          # Execute the tests using pytest
          pytest appium_tests/ -v --tb=short

      # ── 14. Resolve XLSX filename ──────────────────────────
      # Resolves the exact xlsx report name generated by pytest hooks.
      # Rewritten in powershell to locate files and populate GITHUB_ENV.
      - name: 🔍 Resolve XLSX Filename
        if: always()
        shell: powershell
        run: |
          $xlsxFiles = Get-ChildItem -Path "appium_tests/reports/*.xlsx" -ErrorAction SilentlyContinue
          if ($xlsxFiles) {
              $xlsxName = $xlsxFiles[0].Name
              Write-Host "Resolved XLSX report: $xlsxName"
              echo "XLSX_NAME=$xlsxName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
              Write-Host "No XLSX report found."
              echo "XLSX_NAME=not_generated" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      # ── 15. Compile Excel report to premium HTML ───────────
      # Translates the generated Excel workbook into premium interactive HTML report.
      # Rewritten in powershell for runner compatibility.
      - name: 📊 Compile Excel Report to Premium HTML
        if: always()
        shell: powershell
        run: |
          if ($env:XLSX_NAME -ne "not_generated") {
              python tests/selenium_tests/compile_report.py --excel "appium_tests/reports/$env:XLSX_NAME" --output "appium_tests/reports/e2e_report.html"
          } else {
              Write-Warning "No Excel report found to compile."
          }

      # ── 16. List reports (debug) ───────────────────────────
      # Prints folder structure of generated reports for diagnostic logs.
      # Switched to powershell to list files natively.
      - name: 📋 List Generated Report Files
        if: always()
        shell: powershell
        run: |
          Write-Host "=== Reports Directory ==="
          if (Test-Path "appium_tests/reports") {
              Get-ChildItem -Path "appium_tests/reports"
          } else {
              Write-Host "No reports directory found"
          }

      # ── 17. Upload reports as artifacts ────────────────────
      # Uploads report files so developers can inspect results in GitHub Actions console.
      - name: 📤 Upload Appium Reports Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "CrowdSense-App-E2E-Report_${{ env.GIT_BRANCH }}_${{ env.RUN_TS }}_${{ env.GIT_SHA }}"
          path: |
            appium_tests/reports/*.xlsx
            appium_tests/reports/*.html
          retention-days: 30
          if-no-files-found: warn
