name: App E2E Automation Testing

# ─────────────────────────────────────────────────────────────
#  Trigger: runs on every push to any branch,
#           and on pull requests targeting main / master.
#  Goal   : Execute Mobile (Appium) E2E tests on Android emulator,
#           generate Excel/HTML reports, and upload artifacts.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  app-e2e:
    name: Run App E2E Tests & Generate Reports
    runs-on: macos-13

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Java setup (required for Android build toolchain)
      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── 3. Flutter SDK setup ───────────────────────────────
      - name: 🚀 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.6'

      # ── 4. Python setup ────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: appium_tests/requirements.txt

      # ── 5. Install dependencies ────────────────────────────
      - name: 📦 Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r appium_tests/requirements.txt

      # ── 6. Node.js setup ───────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── 7. Install Appium & Driver ─────────────────────────
      - name: 📱 Install Appium & Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # ── 8. Build Flutter debug APK ─────────────────────────
      - name: 🛠️ Build Debug APK
        run: |
          cd frontend
          flutter pub get
          flutter build apk --debug

      # ── 9. Create Reports Directory ────────────────────────
      - name: 📁 Create Reports Directory
        run: mkdir -p appium_tests/reports

      # ── 10. Capture Metadata ───────────────────────────────
      - name: 🏷️ Capture Run Metadata
        run: |
          echo "RUN_TS=$(date +'%Y-%m-%d_%H-%M-%S')"        >> $GITHUB_ENV
          echo "GIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)"    >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}"              >> $GITHUB_ENV

      # ── 11. Run Appium tests in Android emulator ───────────
      - name: 🧪 Execute Appium Mobile E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Pixel_3a
          avd-name: Pixel_3a
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Start Appium server in background
            appium &
            sleep 5
            # Execute the tests using pytest
            pytest appium_tests/ -v --tb=short

      # ── 12. Resolve XLSX filename ──────────────────────────
      - name: 🔍 Resolve XLSX Filename
        if: always()
        run: |
          XLSX=$(ls appium_tests/reports/*.xlsx 2>/dev/null | head -1)
          if [ -n "$XLSX" ]; then
            echo "XLSX_NAME=$(basename $XLSX)" >> $GITHUB_ENV
          else
            echo "XLSX_NAME=not_generated" >> $GITHUB_ENV
          fi

      # ── 13. Compile Excel report to premium HTML ───────────
      - name: 📊 Compile Excel Report to Premium HTML
        if: always()
        run: |
          if [ "${{ env.XLSX_NAME }}" != "not_generated" ]; then
            python tests/selenium_tests/compile_report.py \
              --excel "appium_tests/reports/${{ env.XLSX_NAME }}" \
              --output "appium_tests/reports/e2e_report.html"
          else
            echo "[WARN] No Excel report found to compile."
          fi

      # ── 14. List reports (debug) ───────────────────────────
      - name: 📋 List Generated Report Files
        if: always()
        run: |
          echo "=== Reports Directory ==="
          ls -lh appium_tests/reports/ || echo "No reports directory found"

      # ── 15. Upload reports as artifacts ────────────────────
      - name: 📤 Upload Appium Reports Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "CrowdSense-App-E2E-Report_${{ env.GIT_BRANCH }}_${{ env.RUN_TS }}_${{ env.GIT_SHA }}"
          path: |
            appium_tests/reports/*.xlsx
            appium_tests/reports/*.html
          retention-days: 30
          if-no-files-found: warn
