name: 📊 CrowdSense E2E Report

# ─────────────────────────────────────────────────────────────
#  Trigger: runs on every push to any branch,
#           and on pull requests targeting main / master.
#  Goal   : Execute all Selenium tests against the live
#           GitHub Pages deployment, auto-generate the
#           multi-sheet .xlsx report, and publish a rich
#           final analysis summary inside GitHub Actions.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-report:
    name: Run E2E Tests & Generate XLSX Report
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/selenium_tests/requirements.txt

      # ── 3. Install dependencies ────────────────────────────
      #   pytest-json-report is now listed in requirements.txt
      - name: 📦 Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r tests/selenium_tests/requirements.txt

      # ── 4. Install Chrome + ChromeDriver ───────────────────
      - name: 🌐 Install Google Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 5. Ensure reports directory exists ─────────────────
      - name: 📁 Create Reports Directory
        run: mkdir -p tests/selenium_tests/reports

      # ── 6. Capture metadata ────────────────────────────────
      - name: 🏷️ Capture Run Metadata
        run: |
          echo "RUN_TS=$(date +'%Y-%m-%d_%H-%M-%S')"        >> $GITHUB_ENV
          echo "GIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)"    >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}"              >> $GITHUB_ENV

      # ── 7. Run all Selenium E2E tests ──────────────────────
      #   • Xvfb provides a virtual display (belt-and-suspenders
      #     alongside --headless=new which conftest.py enables
      #     automatically when CI=true)
      #   • --json-report saves machine-readable results for
      #     the summary script to parse
      #   • conftest.py auto-saves the .xlsx on session finish
      #   • continue-on-error: true → report always uploaded
      - name: 🧪 Execute Selenium E2E Tests
        id: run_tests
        continue-on-error: true
        env:
          DISPLAY: ":99"
          CI: "true"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 4
          pytest tests/selenium_tests/ \
            -v \
            --tb=short \
            --timeout=60 \
            -p no:cacheprovider \
            --json-report \
            --json-report-file=tests/selenium_tests/reports/report.json \
            2>&1 | tee tests/selenium_tests/reports/ci_run.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── 8. Resolve XLSX filename ───────────────────────────
      - name: 🔍 Resolve XLSX Filename
        if: always()
        run: |
          XLSX=$(ls tests/selenium_tests/reports/*.xlsx 2>/dev/null | head -1)
          if [ -n "$XLSX" ]; then
            echo "XLSX_NAME=$(basename $XLSX)" >> $GITHUB_ENV
          else
            echo "XLSX_NAME=not_generated" >> $GITHUB_ENV
          fi

      # ── 9. Write rich GitHub Actions summary ───────────────
      - name: 📝 Generate Final Analysis Summary
        if: always()
        run: |
          python tests/selenium_tests/generate_gha_summary.py \
            --json   tests/selenium_tests/reports/report.json \
            --branch "${{ env.GIT_BRANCH }}" \
            --sha    "${{ env.GIT_SHA }}" \
            --xlsx   "${{ env.XLSX_NAME }}"

      # ── 10. List reports (debug) ───────────────────────────
      - name: 📋 List Generated Report Files
        if: always()
        run: |
          echo "=== Reports Directory ==="
          ls -lh tests/selenium_tests/reports/ || echo "No reports directory found"

      # ── 11. Upload XLSX + JSON + log as artifacts ──────────
      - name: 📤 Upload E2E Reports Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "CrowdSense-E2E-Report_${{ env.GIT_BRANCH }}_${{ env.RUN_TS }}_${{ env.GIT_SHA }}"
          path: |
            tests/selenium_tests/reports/*.xlsx
            tests/selenium_tests/reports/*.json
            tests/selenium_tests/reports/*.log
          retention-days: 30
          if-no-files-found: warn
