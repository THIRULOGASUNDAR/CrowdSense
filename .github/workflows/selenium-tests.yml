name: Web E2E Automation Testing

# ─────────────────────────────────────────────────────────────
#  Trigger: runs on every push to any branch,
#           and on pull requests targeting main / master.
#  Goal   : Execute Web (Selenium) E2E tests, generate Excel/HTML reports,
#           and post a rich final analysis summary.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  web-e2e:
    name: Run Web E2E Tests & Generate Reports
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/selenium_tests/requirements.txt

      # ── 3. Install dependencies ────────────────────────────
      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/selenium_tests/requirements.txt

      # ── 4. Install Chrome + ChromeDriver ───────────────────
      - name: 🌐 Install Google Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 5. Ensure reports directory exists ─────────────────
      - name: 📁 Create Reports Directory
        run: mkdir -p tests/selenium_tests/reports

      # ── 6. Capture metadata ────────────────────────────────
      - name: 🏷️ Capture Run Metadata
        run: |
          echo "RUN_TS=$(date +'%Y-%m-%d_%H-%M-%S')"        >> $GITHUB_ENV
          echo "GIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)"    >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}"              >> $GITHUB_ENV

      # ── 7. Run Selenium E2E browser tests only ─────────────
      - name: 🧪 Execute Selenium E2E Tests
        id: run_tests
        continue-on-error: true
        env:
          DISPLAY: ":99"
          CI: "true"
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 4
          pytest tests/selenium_tests/ \
            --ignore=tests/selenium_tests/test_16_vulnerability.py \
            --ignore=tests/selenium_tests/test_17_load.py \
            -v \
            --tb=short \
            --timeout=120 \
            -p no:cacheprovider \
            --json-report \
            --json-report-file=tests/selenium_tests/reports/report.json \
            2>&1 | tee tests/selenium_tests/reports/ci_run.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── 8. Resolve XLSX filename ───────────────────────────
      - name: 🔍 Resolve XLSX Filename
        if: always()
        run: |
          XLSX=$(ls tests/selenium_tests/reports/*.xlsx 2>/dev/null | head -1)
          if [ -n "$XLSX" ]; then
            echo "XLSX_NAME=$(basename $XLSX)" >> $GITHUB_ENV
          else
            echo "XLSX_NAME=not_generated" >> $GITHUB_ENV
          fi

      # ── 9. Write rich GitHub Actions summary ───────────────
      - name: 📝 Generate Final Analysis Summary
        if: always()
        run: |
          python tests/selenium_tests/generate_gha_summary.py \
            --json   tests/selenium_tests/reports/report.json \
            --branch "${{ env.GIT_BRANCH }}" \
            --sha    "${{ env.GIT_SHA }}" \
            --xlsx   "${{ env.XLSX_NAME }}"

      # ── 10. Compile Excel report to premium HTML ───────────
      - name: 📊 Compile Excel Report to Premium HTML
        if: always()
        run: |
          if [ "${{ env.XLSX_NAME }}" != "not_generated" ]; then
            python tests/selenium_tests/compile_report.py \
              --excel "tests/selenium_tests/reports/${{ env.XLSX_NAME }}" \
              --output "tests/selenium_tests/reports/e2e_report.html"
          else
            echo "[WARN] No Excel report found to compile."
          fi

      # ── 11. List reports (debug) ───────────────────────────
      - name: 📋 List Generated Report Files
        if: always()
        run: |
          echo "=== Reports Directory ==="
          ls -lh tests/selenium_tests/reports/ || echo "No reports directory found"

      # ── 12. Upload XLSX + HTML + JSON + log as artifacts ───
      - name: 📤 Upload E2E Reports Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "CrowdSense-Web-E2E-Report_${{ env.GIT_BRANCH }}_${{ env.RUN_TS }}_${{ env.GIT_SHA }}"
          path: |
            tests/selenium_tests/reports/*.xlsx
            tests/selenium_tests/reports/*.json
            tests/selenium_tests/reports/*.log
            tests/selenium_tests/reports/*.html
          retention-days: 30
          if-no-files-found: warn

      # ── 13. Fail if tests failed ───────────────────────────
      - name: ✅ Assert All Web E2E Tests Passed
        if: always()
        run: |
          if [ "${{ env.EXIT_CODE }}" != "0" ]; then
            echo "❌ Selenium browser E2E tests failed! Check reports artifact for details."
            exit 1
          fi
          echo "✅ All Selenium browser E2E tests passed successfully!"
