name: Deploy Flutter Web to GitHub Pages

# ─────────────────────────────────────────────────────────────
#  Trigger: runs on every push to main.
#  Deploys build output directly to the gh-pages branch using
#  a plain git push — no third-party deploy actions needed.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build Flutter Web & Deploy to gh-pages
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Flutter SDK
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. Install dependencies
      - name: Flutter pub get
        working-directory: frontend
        run: flutter pub get

      # 4. Build Flutter web (release)
      - name: Build Flutter Web (Release)
        working-directory: frontend
        run: |
          flutter build web --release \
            --base-href /CrowdSense/

      # 5. Add .nojekyll so folders starting with _ work
      - name: Add .nojekyll
        run: touch frontend/build/web/.nojekyll

      # 6. Deploy — git push build output to gh-pages branch
      - name: Deploy to gh-pages branch
        run: |
          cd frontend/build/web

          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Deploy Flutter web build from ${{ github.sha }}"

          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
