name: Deploy Flutter Web to GitHub Pages

# ─────────────────────────────────────────────────────────────
#  Trigger: runs on every push to main (source of truth).
#  Goal   : Build the Flutter web app and publish it to the
#           gh-pages branch so that:
#             • https://thirulogasundar.github.io/CrowdSense
#               always reflects the latest UI changes.
#             • Selenium / load / vulnerability tests always
#               test the current version.
#  Note   : This workflow ONLY builds & deploys — it does NOT
#            run any tests, so existing workflows are unaffected.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: write      # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    name: 🏗️ Build Flutter Web & 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ─────────────────────────────────
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Flutter SDK setup ───────────────────────────────
      - name: 🦋 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 3. Install dependencies ────────────────────────────
      - name: 📦 Flutter pub get
        working-directory: frontend
        run: flutter pub get

      # ── 4. Build Flutter web (release) ────────────────────
      #   --base-href must match the GitHub Pages sub-path.
      #   For a user/org pages repo at /<repo-name>/ use that path.
      - name: 🔨 Build Flutter Web (Release)
        working-directory: frontend
        run: |
          flutter build web --release \
            --base-href /CrowdSense/ \
            --no-wasm-dry-run

      # ── 5. Add .nojekyll so folders starting with _ work ──
      - name: 📄 Add .nojekyll
        run: touch frontend/build/web/.nojekyll

      # ── 6. Deploy to gh-pages branch ──────────────────────
      - name: 🚀 Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/build/web
          publish_branch: gh-pages
          commit_message: "Deploy Flutter web build from ${{ github.sha }}"
          force_orphan: false
