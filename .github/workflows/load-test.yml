name: Load Test

# ─────────────────────────────────────────────────────────────────────────────
#  Trigger: push to main/master, pull requests to main/master,
#           or manual trigger via workflow_dispatch.
#  Goal   : Run 310 read-only load tests (TC-LOAD-PAGE-001 to TC-LOAD-FB-062) against the live
#           CrowdSense GitHub Pages deployment. No browser required —
#           pure HTTP/SSL/threading checks only.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
    paths:
      - "tests/selenium_tests/test_17_load.py"
      - ".github/workflows/load-test.yml"
  pull_request:
    branches: [ main, master ]
    paths:
      - "tests/selenium_tests/test_17_load.py"
      - ".github/workflows/load-test.yml"
  workflow_dispatch:

jobs:
  load-test:
    name: 🚀 CrowdSense Load Test — 310 Read-Only Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python Setup ─────────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/selenium_tests/requirements.txt

      # ── 3. Install Python Dependencies ──────────────────────────────────────
      - name: 📦 Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r tests/selenium_tests/requirements.txt

      # ── 4. Create Reports Directory ─────────────────────────────────────────
      - name: 📁 Create Reports Directory
        run: mkdir -p tests/selenium_tests/reports

      # ── 5. Capture Run Metadata ─────────────────────────────────────────────
      - name: 🏷️ Capture Run Metadata
        run: |
          echo "RUN_TS=$(date +'%Y-%m-%d_%H-%M-%S')"      >> $GITHUB_ENV
          echo "GIT_SHA=$(echo $GITHUB_SHA | cut -c1-7)"  >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}"            >> $GITHUB_ENV

      # ── 6. Run Load Tests (No Browser Needed) ───────────────────────────────
      - name: 🧪 Execute 310 Read-Only Load Tests
        id: run_load_tests
        env:
          CI: "true"
        run: |
          pytest tests/selenium_tests/test_17_load.py \
            -v \
            --tb=short \
            --timeout=120 \
            -p no:cacheprovider \
            --json-report \
            --json-report-file=tests/selenium_tests/reports/load_report.json \
            2>&1 | tee tests/selenium_tests/reports/load_ci_run.log
          echo "LOAD_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── 7. Resolve XLSX Filename ─────────────────────────────────────────────
      - name: 🔍 Resolve XLSX Report Filename
        if: always()
        run: |
          XLSX=$(ls tests/selenium_tests/reports/*.xlsx 2>/dev/null | head -1)
          if [ -n "$XLSX" ]; then
            echo "XLSX_NAME=$(basename $XLSX)" >> $GITHUB_ENV
          else
            echo "XLSX_NAME=not_generated"    >> $GITHUB_ENV
          fi

      # ── 8. Write GitHub Actions Step Summary ────────────────────────────────
      - name: 📝 Write Load Test Summary
        if: always()
        run: |
          PASSED=$(grep -c " PASSED" tests/selenium_tests/reports/load_ci_run.log 2>/dev/null || echo "0")
          FAILED=$(grep -c " FAILED" tests/selenium_tests/reports/load_ci_run.log 2>/dev/null || echo "0")
          SKIPPED=$(grep -c " SKIPPED" tests/selenium_tests/reports/load_ci_run.log 2>/dev/null || echo "0")
          TOTAL=$((PASSED + FAILED + SKIPPED))
          DURATION=$(grep -oP '\d+\.\d+s \(' tests/selenium_tests/reports/load_ci_run.log | tail -1 || echo "N/A")

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🚀 CrowdSense Load Test Report

          | Metric        | Value |
          |---------------|-------|
          | 🟢 Passed     | **${PASSED}** |
          | 🔴 Failed     | **${FAILED}** |
          | ⚪ Skipped    | **${SKIPPED}** |
          | 📊 Total      | **${TOTAL}** |
          | ⏱️ Duration   | ${DURATION} |
          | 🌿 Branch     | \`${{ env.GIT_BRANCH }}\` |
          | 🔖 Commit     | \`${{ env.GIT_SHA }}\` |
          | 📁 Report     | \`${{ env.XLSX_NAME }}\` |

          ### 📋 Test Categories (62 tests each)
          | # | Category | TC Range |
          |---|----------|----------|
          | 1 | Page Load Performance | TC-LOAD-PAGE-001 to TC-LOAD-PAGE-062 |
          | 2 | Web Vitals | TC-LOAD-VIT-001 to TC-LOAD-VIT-062 |
          | 3 | Asset Performance | TC-LOAD-AST-001 to TC-LOAD-AST-062 |
          | 4 | Application Performance | TC-LOAD-APP-001 to TC-LOAD-APP-062 |
          | 5 | Firebase Performance | TC-LOAD-FB-001 to TC-LOAD-FB-062 |

          > ✅ All tests are **read-only** — no browser, no login, no data writes.
          > Target: **https://thirulogasundar.github.io/CrowdSense**
          EOF

      # ── 9. Compile Excel Report to Premium HTML ──────────────────────────────
      - name: 📊 Compile Load Test Excel to HTML
        if: always()
        run: |
          if [ "${{ env.XLSX_NAME }}" != "not_generated" ]; then
            python tests/selenium_tests/compile_report.py \
              --excel "tests/selenium_tests/reports/${{ env.XLSX_NAME }}" \
              --output "tests/selenium_tests/reports/load_test_report.html"
          else
            echo "[WARN] No Excel report found to compile."
          fi

      # ── 10. List Generated Reports ───────────────────────────────────────────
      - name: 📋 List Generated Report Files
        if: always()
        run: |
          echo "=== Load Test Reports ==="
          ls -lh tests/selenium_tests/reports/ || echo "No reports directory found"

      # ── 11. Upload Load Test Reports as Artifacts ─────────────────────────────
      - name: 📤 Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "load-test-report"
          path: |
            tests/selenium_tests/reports/load_report.json
            tests/selenium_tests/reports/load_ci_run.log
            tests/selenium_tests/reports/*.xlsx
            tests/selenium_tests/reports/load_test_report.html
          retention-days: 30
          if-no-files-found: warn

      # ── 12. Fail the job if any tests failed ─────────────────────────────────
      - name: ✅ Assert All 310 Tests Passed
        if: always()
        run: |
          if [ "${{ env.LOAD_EXIT }}" != "0" ]; then
            echo "❌ Load tests failed! Check the report artifact for details."
            exit 1
          fi
          echo "✅ All 310 load tests passed successfully!"
