[pytest]
# CrowdSense Appium Mobile E2E Test Suite — pytest configuration
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity
log_cli = true
log_cli_level = INFO

# Timeout (seconds) — Appium tests are slower than Selenium
timeout = 120

# Markers
markers =
    smoke:        Quick critical path sanity checks
    auth:         Authentication and route guard tests
    home:         Home screen and bottom navigation tests
    search:       Search and place discovery tests
    place:        Place details and crowd intelligence tests
    profile:      Profile and account tests
    favorites:    Favorites tests
    planner:      Travel planner tests
    settings:     Settings tests
    regression:   Full regression suite
