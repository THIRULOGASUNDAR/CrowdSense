[pytest]
# CrowdSense — Appium Physical Device E2E Test Suite
# Runs on a REAL Android phone connected via USB cable

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output with short tracebacks
addopts = -v --tb=short

# Test markers
markers =
    smoke:      Critical path tests — run first for quick health check
    auth:       Authentication screen tests (PM001–PM022)
    home:       Home screen & navigation tests (PM023–PM040)
    search:     Search screen tests (PM041–PM045)
    place:      Place Details & Crowd Report tests (PM046–PM060)
    profile:    Profile screen tests (PM061–PM071)
    settings:   Settings screen tests (PM072–PM078)
    planner:    Travel Planner tests (PM079–PM084)
    favorites:  Favorites screen tests (PM085–PM090)

# Log output
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

# Timeout per test (seconds) — real devices can be slower
timeout = 180
